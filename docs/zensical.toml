[project]
site_name = "Nodus"
site_description = "Local-first knowledge graph with EU sovereignty"
site_author = "Sören Wacker"

site_dir = "public/"
site_url = "/"
docs_dir = "content/"
repo_url = "https://github.com/sorenwacker/nodus"

extra_css = ["assets/nightsky.css"]

nav = [
    {"Home" = "index.md"},
    {"Downloads" = "downloads.md"},
    {"Getting Started" = "getting-started.md"},
    {"Features" = "features.md"},
    {"Typst Math Reference" = "typst-math-reference.md"},
    {"Development" = "development.md"},
]

[project.theme]
language = "en"
variant = "modern"
features = [
    "navigation.tabs",
    "navigation.top",
    "navigation.footer",
    "toc.follow",
    "content.code.copy",
]
font.code = "JetBrains Mono"
logo = "assets/logo.svg"

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "material/weather-night"
toggle.name = "Switch to dark mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.tables]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
