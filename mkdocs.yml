site_name: Nodus
site_description: Local-first knowledge graph with EU sovereignty
site_url: https://sorenwacker.github.io/nodus/
repo_url: https://github.com/sorenwacker/nodus
repo_name: sorenwacker/nodus

theme:
  name: material
  custom_dir: docs/overrides
  logo: images/logo.svg
  favicon: images/logo.svg
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Downloads: downloads.md
  - Getting Started: getting-started.md
  - Features: features.md
  - Typst Math Reference: typst-math-reference.md
  - Development: development.md

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/nightsky.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sorenwacker/nodus
