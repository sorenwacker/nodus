<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Cyan glow -->
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Magenta glow -->
    <filter id="glow-magenta" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Edge glow -->
    <filter id="glow-edge" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>


  <!-- Edges (connections between nodes) -->
  <g filter="url(#glow-edge)" stroke-width="16" stroke-linecap="round" fill="none">
    <!-- Center to top-right -->
    <line x1="256" y1="256" x2="420" y2="95" stroke="#00ffcc"/>
    <!-- Center to bottom-left -->
    <line x1="256" y1="256" x2="85" y2="410" stroke="#00ffcc"/>
    <!-- Center to left -->
    <line x1="256" y1="256" x2="70" y2="170" stroke="#00ccff"/>
    <!-- Center to bottom-right -->
    <line x1="256" y1="256" x2="430" y2="390" stroke="#ff00ff"/>
  </g>

  <!-- Outer nodes (smaller) -->
  <g filter="url(#glow-cyan)">
    <circle cx="420" cy="95" r="36" fill="none" stroke="#00ffcc" stroke-width="10"/>
    <circle cx="85" cy="410" r="36" fill="none" stroke="#00ffcc" stroke-width="10"/>
    <circle cx="70" cy="170" r="32" fill="none" stroke="#00ccff" stroke-width="10"/>
  </g>

  <!-- Magenta node -->
  <g filter="url(#glow-magenta)">
    <circle cx="430" cy="390" r="34" fill="none" stroke="#ff00ff" stroke-width="10"/>
  </g>

  <!-- Center node (main, larger) -->
  <g filter="url(#glow-magenta)">
    <circle cx="256" cy="256" r="68" fill="none" stroke="#ff00ff" stroke-width="14"/>
    <circle cx="256" cy="256" r="34" fill="#ff00ff" fill-opacity="0.8"/>
  </g>

  <!-- Inner node highlights -->
  <circle cx="420" cy="95" r="18" fill="#00ffcc" fill-opacity="0.7"/>
  <circle cx="85" cy="410" r="18" fill="#00ffcc" fill-opacity="0.7"/>
  <circle cx="70" cy="170" r="16" fill="#00ccff" fill-opacity="0.7"/>
  <circle cx="430" cy="390" r="17" fill="#ff00ff" fill-opacity="0.7"/>
</svg>
