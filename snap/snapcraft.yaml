name: nodus
version: '0.4.14'
summary: Local-first knowledge graph with EU sovereignty
description: |
  Nodus is a canvas-based visual thinking tool where research nodes,
  Typst math, and Obsidian vaults live on a single workspace.

  Features:
  - Single canvas where document and whiteboard are the same thing
  - Native Typst math rendering (sub-second, no LaTeX compile times)
  - Obsidian vault compatibility with bi-directional sync
  - Local-first architecture - your data stays on your device
  - Graph visualization with force-directed layouts
  - Citation management with Zotero integration
  - LLM integration for research assistance

grade: stable
confinement: strict
base: core22

architectures:
  - build-on: amd64

apps:
  nodus:
    command: nodus
    desktop: usr/share/applications/nodus.desktop
    extensions: [gnome]
    plugs:
      - home
      - network
      - network-bind
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - browser-support
      - password-manager-service

parts:
  nodus:
    plugin: nil
    source: .
    build-packages:
      - curl
      - wget
      - libwebkit2gtk-4.1-dev
      - libappindicator3-dev
      - librsvg2-dev
      - patchelf
      - libssl-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libayatana-appindicator3-1
      - librsvg2-2
      - libgtk-3-0
    override-build: |
      # Install Node.js
      curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      apt-get install -y nodejs

      # Install Rust
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      export PATH="$HOME/.cargo/bin:$PATH"

      # Build the app
      npm ci
      npm run tauri build -- --bundles deb

      # Install to snapcraft directory
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/bin
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/share/applications
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/256x256/apps

      cp src-tauri/target/release/nodus $SNAPCRAFT_PART_INSTALL/usr/bin/
      cp snap/gui/nodus.desktop $SNAPCRAFT_PART_INSTALL/usr/share/applications/
      cp src-tauri/icons/128x128.png $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/256x256/apps/nodus.png
